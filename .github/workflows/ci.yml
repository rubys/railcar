name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ===========================================================================
  # Stage 1: Build artifacts (run in parallel)
  # ===========================================================================

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install SQLite3 dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Install prism gem
        run: sudo gem install prism

      - name: Install Crystal dependencies
        run: shards install

      - name: Build libprism
        run: |
          sudo make build/lib/libprism.a
          sudo chown -R $(id -u):$(id -g) build

      - name: Build binary
        run: make

      - name: Upload railcar binary
        uses: actions/upload-artifact@v4
        with:
          name: railcar-binary
          path: build/railcar
          retention-days: 7

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install SQLite3 dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Install prism gem
        run: sudo gem install prism

      - name: Install Crystal dependencies
        run: shards install

      - name: Build libprism
        run: |
          sudo make build/lib/libprism.a
          sudo chown -R $(id -u):$(id -g) build

      - name: Run unit tests
        run: make test

  download-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download demo blog
        run: make build/demo/blog/Gemfile

      - name: Upload demo blog
        uses: actions/upload-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog
          retention-days: 7

  # Extract turbo.min.js from the turbo-rails gem. Split from test-rust
  # because `gem install turbo-rails` takes ~60s and doesn't depend on
  # anything else — runs fully in parallel with build/unit-test/demo.
  rust-turbo-js:
    runs-on: ubuntu-latest
    steps:
      - name: Install turbo-rails gem
        run: sudo gem install turbo-rails

      - name: Extract turbo.min.js
        run: |
          mkdir -p out
          cp $(ruby -e "puts Gem::Specification.find_by_name('turbo-rails').gem_dir + '/app/assets/javascripts/turbo.min.js'") out/turbo.min.js

      - name: Upload turbo.min.js
        uses: actions/upload-artifact@v4
        with:
          name: rust-turbo-js
          path: out/turbo.min.js
          retention-days: 7

  # ===========================================================================
  # Stage 2: Generate and test each language (run in parallel)
  # ===========================================================================

  test-crystal:
    needs: [build, download-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install SQLite3 dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Generate Crystal blog
        run: build/railcar build/demo/blog build/crystal-blog

      - name: Build and test Crystal blog
        run: |
          cd build/crystal-blog
          shards install
          crystal build src/app.cr -o blog
          crystal spec

      - name: Upload Crystal blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-crystal
          path: build/crystal-blog
          retention-days: 7

  test-python:
    needs: [build, download-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Generate Python blog
        run: build/railcar --python build/demo/blog build/python-blog

      - name: Test Python blog
        run: |
          cd build/python-blog
          uv run --extra test python -m pytest tests/ -v

      - name: Upload Python blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-python
          path: build/python-blog
          retention-days: 7

  test-typescript:
    needs: [build, download-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Generate TypeScript blog
        run: build/railcar --typescript build/demo/blog build/ts-blog

      - name: Test TypeScript blog
        run: |
          cd build/ts-blog
          npm install
          npx tsx --test tests/*.test.ts

      - name: Upload TypeScript blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-typescript
          path: build/ts-blog
          retention-days: 7

  test-ts-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test TypeScript runtime
        run: |
          cd src/runtime/typescript
          npm install
          npx tsx base_runtime_test.ts

  test-elixir:
    needs: [build, download-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18'
          otp-version: '27'

      - name: Install SQLite3 dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Generate Elixir blog
        run: build/railcar --elixir build/demo/blog build/ex-blog

      - name: Test Elixir blog
        run: |
          cd build/ex-blog
          mix deps.get
          mix test --no-start

      - name: Upload Elixir blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-elixir
          path: build/ex-blog
          retention-days: 7

  test-go:
    needs: [build, download-demo]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Generate Go blog
        run: build/railcar --go build/demo/blog build/go-blog

      - name: Test Go blog
        run: |
          cd build/go-blog
          go mod tidy
          go test ./...

      - name: Upload Go blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-go
          path: build/go-blog
          retention-days: 7

  test-rust:
    needs: [build, download-demo, rust-turbo-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download railcar binary
        uses: actions/download-artifact@v4
        with:
          name: railcar-binary
          path: build

      - name: Download demo blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: build/demo/blog

      - name: Download turbo.min.js
        uses: actions/download-artifact@v4
        with:
          name: rust-turbo-js
          path: build/rust-turbo-js

      - name: Make binary executable
        run: chmod +x build/railcar

      - name: Generate Rust blog
        run: build/railcar --rust build/demo/blog build/rust-blog

      - name: Generate static assets
        run: |
          cd build/rust-blog
          mkdir -p static
          npm install tailwindcss @tailwindcss/cli
          echo '@import "tailwindcss";' > input.css
          npx @tailwindcss/cli --input input.css --output static/app.css --minify --content 'src/**/*.rs'
          rm -f input.css
          cp ../rust-turbo-js/turbo.min.js static/turbo.min.js

      - name: Test Rust blog
        run: |
          cd build/rust-blog
          cargo test -- --test-threads=1

      - name: Upload Rust blog
        uses: actions/upload-artifact@v4
        with:
          name: generated-rust
          path: build/rust-blog
          retention-days: 7

  build-binaries:
    needs: [test-rust]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: blog-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: blog-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: blog-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: blog-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download generated Rust blog
        uses: actions/download-artifact@v4
        with:
          name: generated-rust
          path: build/rust-blog

      - name: Build release binary
        run: |
          cd build/rust-blog
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          mkdir -p dist/${{ matrix.name }}
          cp build/rust-blog/target/${{ matrix.target }}/release/blog dist/${{ matrix.name }}/blog${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          cp -r build/rust-blog/static dist/${{ matrix.name }}/
          cd dist && tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz
          retention-days: 7

  # ===========================================================================
  # Stage 3: Build GitHub Pages site
  # ===========================================================================

  build-site:
    needs: [test-crystal, test-elixir, test-go, test-python, test-rust, test-typescript, build-binaries]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download original Rails blog
        uses: actions/download-artifact@v4
        with:
          name: demo-blog
          path: artifacts/ruby

      - name: Download Crystal blog
        uses: actions/download-artifact@v4
        with:
          name: generated-crystal
          path: artifacts/crystal

      - name: Download Python blog
        uses: actions/download-artifact@v4
        with:
          name: generated-python
          path: artifacts/python

      - name: Download TypeScript blog
        uses: actions/download-artifact@v4
        with:
          name: generated-typescript
          path: artifacts/typescript

      - name: Download Elixir blog
        uses: actions/download-artifact@v4
        with:
          name: generated-elixir
          path: artifacts/elixir

      - name: Download Go blog
        uses: actions/download-artifact@v4
        with:
          name: generated-go
          path: artifacts/go

      - name: Download Rust blog
        uses: actions/download-artifact@v4
        with:
          name: generated-rust
          path: artifacts/rust

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: blog-*
          path: artifacts/binaries

      - name: Build file manifests
        run: |
          for lang in ruby crystal elixir go python rust typescript; do
            node pages/build-manifest.js "artifacts/$lang" "$lang" > "artifacts/${lang}.json"
          done

      - name: Assemble site
        run: |
          mkdir -p _site
          cp pages/index.html _site/
          cp pages/style.css _site/
          cp pages/app.js _site/
          cp artifacts/ruby.json _site/
          cp artifacts/crystal.json _site/
          cp artifacts/elixir.json _site/
          cp artifacts/go.json _site/
          cp artifacts/python.json _site/
          cp artifacts/rust.json _site/
          cp artifacts/typescript.json _site/
          cp pages/downloads.html _site/
          mkdir -p _site/downloads
          for f in artifacts/binaries/blog-*/*.tar.gz; do
            cp "$f" _site/downloads/
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ===========================================================================
  # Stage 4: Deploy to GitHub Pages (main branch only)
  # ===========================================================================

  deploy:
    needs: [build-site]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
