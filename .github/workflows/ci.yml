name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install SQLite3 dev headers
        run: sudo apt-get install -y libsqlite3-dev

      - name: Install prism gem
        run: sudo gem install prism

      - name: Install Crystal dependencies
        run: shards install

      - name: Build libprism
        run: |
          sudo make build/lib/libprism.a
          sudo chown -R $(id -u):$(id -g) build

      - name: Download demo blog
        run: make build/demo/blog/Gemfile

      - name: Run tests
        run: make test

      - name: Build binary
        run: make

      - name: Generate, compile, and test Crystal blog
        run: |
          build/railcar build/demo/blog build/crystal-blog
          cd build/crystal-blog
          shards install
          crystal build src/app.cr -o blog
          crystal spec

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Generate and test Python blog (--python)
        run: |
          build/railcar --python build/demo/blog build/python-blog
          cd build/python-blog
          uv run --extra test python -m pytest tests/ -v

      - name: Test TypeScript runtime
        run: |
          cd src/runtime/typescript
          npm install
          npx tsx base_runtime_test.ts
